name: Windows build and test

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip wheel
          pip install -e ".[dev]"

      - name: Run tests (no audio hardware required for protocol/hub)
        run: python -m pytest tests/test_protocol.py tests/test_hub.py tests/test_discovery.py -v

      - name: Import and CLI smoke
        run: |
          python -c "from babblecast.client.qt.main_window import MainWindow; from babblecast.server.embedded import EmbeddedServer; print('imports ok')"
          python -m babblecast.cli --help

      - name: Build Windows executable
        run: |
          pip install pyinstaller
          pyinstaller packaging/windows/babblecast.spec --noconfirm

      - name: Verify executable exists
        shell: pwsh
        run: |
          if (-not (Test-Path dist/BabbleCast.exe)) { throw 'BabbleCast.exe missing' }
          (Get-Item dist/BabbleCast.exe).Length | Out-Host
          Write-Host "BabbleCast.exe built successfully"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BabbleCast-Windows
          path: dist/BabbleCast.exe
